<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildGuard | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            overflow: hidden;
        }
        .auth-bg {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: url('https://images.unsplash.com/photo-1564349683136-77e08dba1ef3?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
            opacity: 0.08; z-index: -1;
        }
        .auth-card {
            width: 100%;
            max-width: 460px;
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--sage-light);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .auth-tabs {
            display: flex;
            background: rgba(255,255,255,0.04);
            border-radius: 50px;
            padding: 4px;
            margin-bottom: 2rem;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.65rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            color: var(--text-muted);
            user-select: none;
        }
        .auth-tab.active {
            background: var(--sage);
            color: var(--primary-dark);
            box-shadow: 0 4px 15px rgba(135,159,130,0.4);
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap .form-control { padding-left: 2.8rem; }
        .input-icon-wrap .form-icon {
            position: absolute;
            left: 1rem; top: 50%;
            transform: translateY(-50%);
            color: var(--sage);
            font-size: 0.9rem;
        }
        .auth-error {
            background: rgba(224,122,95,0.15);
            border: 1px solid rgba(224,122,95,0.4);
            color: #f1a08a;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .auth-success {
            background: rgba(74,130,127,0.15);
            border: 1px solid rgba(74,130,127,0.4);
            color: #7fc9c6;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .divider-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            position: relative;
            margin: 1.5rem 0;
        }
        .divider-text::before, .divider-text::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: var(--glass-border);
        }
        .divider-text::before { left: 0; }
        .divider-text::after  { right: 0; }
    </style>
</head>
<body>
    <div class="auth-bg"></div>

    <div class="auth-page">
        <div class="auth-card glass-panel p-4 p-md-5">
            <!-- Logo -->
            <a href="/" class="auth-logo d-flex justify-content-center mb-4">
                <i class="fa-solid fa-leaf text-sage"></i> WildGuard
            </a>

            <!-- Tabs -->
            <div class="auth-tabs" id="authTabs">
                <div class="auth-tab active" data-tab="login">Login</div>
                <div class="auth-tab" data-tab="register">Register</div>
            </div>

            <!-- Login Form -->
            <div class="auth-form active" id="loginForm">
                <p class="text-center mb-4" style="color:var(--text-muted);">Welcome back, wildlife guardian.</p>
                <div id="loginError" class="auth-error mb-3"></div>

                <div class="mb-3 input-icon-wrap">
                    <i class="fa-solid fa-envelope form-icon"></i>
                    <input type="email" id="loginEmail" class="form-control" placeholder="Email address" required>
                </div>
                <div class="mb-4 input-icon-wrap">
                    <i class="fa-solid fa-lock form-icon"></i>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
                </div>

                <button class="btn btn-accent w-100 py-3 rounded-3 fs-6 fw-bold" id="loginBtn">
                    <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Sign In
                </button>

                <div class="divider-text">or</div>
                <p class="text-center mb-0" style="color:var(--text-muted); font-size:0.9rem;">
                    Don't have an account? 
                    <a href="#" class="text-sage fw-bold" id="goToRegister">Register here</a>
                </p>
            </div>

            <!-- Register Form -->
            <div class="auth-form" id="registerForm">
                <p class="text-center mb-4" style="color:var(--text-muted);">Join the movement to protect wildlife.</p>
                <div id="registerError" class="auth-error mb-3"></div>
                <div id="registerSuccess" class="auth-success mb-3"></div>

                <div class="mb-3 input-icon-wrap">
                    <i class="fa-solid fa-user form-icon"></i>
                    <input type="text" id="regUsername" class="form-control" placeholder="Username" required>
                </div>
                <div class="mb-3 input-icon-wrap">
                    <i class="fa-solid fa-envelope form-icon"></i>
                    <input type="email" id="regEmail" class="form-control" placeholder="Email address" required>
                </div>
                <div class="mb-4 input-icon-wrap">
                    <i class="fa-solid fa-lock form-icon"></i>
                    <input type="password" id="regPassword" class="form-control" placeholder="Password (min 6 chars)" required>
                </div>

                <button class="btn btn-accent w-100 py-3 rounded-3 fs-6 fw-bold" id="registerBtn">
                    <i class="fa-solid fa-user-plus me-2"></i>Create Account
                </button>

                <div class="divider-text">or</div>
                <p class="text-center mb-0" style="color:var(--text-muted); font-size:0.9rem;">
                    Already have an account? 
                    <a href="#" class="text-sage fw-bold" id="goToLogin">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.isLoggedIn()) {
            window.location.href = Auth.isAdmin() ? '/admin.html' : '/';
        }

        // Tab switching
        const tabs = document.querySelectorAll('.auth-tab');
        tabs.forEach(tab => tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
        }));

        document.getElementById('goToRegister').addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelector('[data-tab="register"]').click();
        });
        document.getElementById('goToLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelector('[data-tab="login"]').click();
        });

        // Login
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Signing in...';
            btn.disabled = true;

            try {
                const user = await Auth.login(
                    document.getElementById('loginEmail').value.trim(),
                    document.getElementById('loginPassword').value
                );
                window.location.href = user.role === 'admin' ? '/admin.html' : '/';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
                btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Sign In';
                btn.disabled = false;
            }
        });

        // Register
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const btn = document.getElementById('registerBtn');
            const errEl = document.getElementById('registerError');
            const okEl  = document.getElementById('registerSuccess');
            errEl.style.display = 'none';
            okEl.style.display  = 'none';
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Creating account...';
            btn.disabled = true;

            try {
                const user = await Auth.register(
                    document.getElementById('regUsername').value.trim(),
                    document.getElementById('regEmail').value.trim(),
                    document.getElementById('regPassword').value
                );
                okEl.textContent = `Account created! Welcome, ${user.username}. Redirecting...`;
                okEl.style.display = 'block';
                setTimeout(() => window.location.href = '/', 1500);
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
                btn.innerHTML = '<i class="fa-solid fa-user-plus me-2"></i>Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
